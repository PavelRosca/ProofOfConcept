<section class="section py-12">
  <div class="container">
    <div class="row">
      <div class="lg:col-8 mx-auto">
        <h1 class="text-3xl font-semibold">Iscriviti</h1>
        <p class="mt-4 text-gray-700">Diventa membro: compila il modulo per ricevere informazioni e partecipare alle attività locali.</p>
        <form class="mt-6 space-y-4 max-w-xl">
          <div>
            <label class="block text-sm">Nome e Cognome</label>
            <input class="input mt-1 w-full" type="text" name="name" />
          </div>
          <div>
            <label class="block text-sm">Email</label>
            <input class="input mt-1 w-full" type="email" name="email" />
          </div>
          <div>
            <label class="block text-sm">Regione</label>
            <select class="input mt-1 w-full" name="region">
              <option>Seleziona regione</option>
            </select>
          </div>
          <div>
            <button class="btn btn-primary">Invia iscrizione</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
