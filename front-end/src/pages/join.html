<section class="section py-12">
  <div class="container">
    <div class="row">
      <div class="lg:col-8 mx-auto">
        <h1 class="text-3xl font-semibold" data-i18n="join.page.title">Iscriviti</h1>
        <p class="mt-4 text-gray-700" data-i18n="join.page.intro">Diventa membro: compila il modulo per ricevere informazioni e partecipare alle attività locali.</p>
        <form class="mt-6 space-y-4 max-w-xl">
          <div>
            <label class="block text-sm" data-i18n="join.form.name">Nome e Cognome</label>
            <input class="input mt-1 w-full" type="text" name="name" />
          </div>
          <div>
            <label class="block text-sm" data-i18n="join.form.email">Email</label>
            <input class="input mt-1 w-full" type="email" name="email" />
          </div>
          <div>
            <label class="block text-sm" data-i18n="join.form.region">Regione</label>
            <select class="input mt-1 w-full" name="region">
              <option data-i18n="join.form.regionPlaceholder">Seleziona regione</option>
            </select>
          </div>
          <div>
            <button class="btn btn-primary" data-i18n="join.form.submit">Invia iscrizione</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
